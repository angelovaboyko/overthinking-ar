<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Overthinking Happiness AR — Angelova Boyko</title>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: sans-serif; }

    #splash {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #1a0a2e 0%, #3d1a5c 50%, #1a0a2e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s ease;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }

    #splash h1 {
      color: #f0c4f4;
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      text-align: center;
      padding: 0 2rem;
    }
    #splash p {
      color: #c89ed0;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      margin-bottom: 2.5rem;
      text-align: center;
    }
    #splash .pulse {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid #f0c4f4;
      animation: pulse 1.5s ease-in-out infinite;
      margin-bottom: 1.5rem;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.5; }
    }
    #startBtn {
      background: transparent;
      border: 1px solid #f0c4f4;
      color: #f0c4f4;
      padding: 0.9rem 2.5rem;
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.3s;
    }
    #startBtn:hover, #startBtn:active {
      background: #f0c4f4;
      color: #1a0a2e;
    }

    #hint {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.7);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-align: center;
      z-index: 100;
      pointer-events: none;
      text-transform: uppercase;
    }

    #credit {
      position: fixed;
      top: 1rem;
      right: 1rem;
      color: rgba(255,255,255,0.5);
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      z-index: 100;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <!-- Splash screen -->
  <div id="splash">
    <h1>Overthinking Happiness</h1>
    <p>Angelova Boyko · Galloping My Thoughts</p>
    <div class="pulse"></div>
    <button id="startBtn">Activar AR</button>
  </div>

  <div id="hint">Apunta la cámara hacia la obra</div>
  <div id="credit">Angelova Boyko © 2025</div>

  <!-- AR Scene -->
  <a-scene
    mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: yes; uiError: yes; uiScanning: yes;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    id="arScene">

    <a-assets>
      <video
        id="arVideo"
        src="video.mp4"
        preload="auto"
        loop
        muted
        playsinline
        webkit-playsinline
        crossorigin="anonymous">
      </video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" id="target0">
      <a-video
        src="#arVideo"
        position="0 0 0.001"
        width="1"
        height="1"
        rotation="0 0 0">
      </a-video>
    </a-entity>

  </a-scene>

  <script>
    const startBtn = document.getElementById('startBtn');
    const splash = document.getElementById('splash');
    const sceneEl = document.getElementById('arScene');
    const video = document.getElementById('arVideo');
    const target0 = document.getElementById('target0');

    startBtn.addEventListener('click', () => {
      splash.classList.add('hidden');
      setTimeout(() => {
        splash.style.display = 'none';
        sceneEl.components['mindar-image'].startAR();
      }, 800);
    });

    // Play video when target found, pause when lost
    target0.addEventListener('targetFound', () => {
      video.play();
    });
    target0.addEventListener('targetLost', () => {
      video.pause();
    });
  </script>

</body>
</html>
